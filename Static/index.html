<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Smart FAQ Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span>🤖 AI FAQ Assistant</span>
            <span style="font-size: 12px; opacity: 0.8;">Powered by Hugging Face</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="bot-message">
                👋 Hi! I'm your FAQ assistant. Ask me anything about our products, shipping, returns, or contact info!
            </div>
        </div>
        <div class="quick-questions">
            <button class="quick-btn" data-question="What are your hours?">🕒 Hours</button>
            <button class="quick-btn" data-question="Return policy?">🔄 Returns</button>
            <button class="quick-btn" data-question="Shipping time?">📦 Shipping</button>
            <button class="quick-btn" data-question="How to contact?">📧 Contact</button>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your question here..." />
            <button id="sendBtn">Send ➤</button>
        </div>
        <div class="status" id="status"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
